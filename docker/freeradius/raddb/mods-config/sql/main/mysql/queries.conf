# ============================================================
# Skynity ISP — SQL queries (MySQL dialect)
# ------------------------------------------------------------
# Copy of the canonical FreeRADIUS 3.2 query set, trimmed to
# what Skynity uses and annotated with ISP-specific notes.
#
# The schema is FreeRADIUS-standard (radcheck / radreply /
# radusergroup / radgroupcheck / radgroupreply / radacct /
# radpostauth / nas) — see backend/migrations/020_radius_aaa.sql.
# ============================================================

# -- authorize ------------------------------------------------
authorize_check_query = "\
    SELECT id, username, attribute, value, op \
    FROM   ${authcheck_table} \
    WHERE  username = '%{SQL-User-Name}' \
    ORDER  BY id"

authorize_reply_query = "\
    SELECT id, username, attribute, value, op \
    FROM   ${authreply_table} \
    WHERE  username = '%{SQL-User-Name}' \
    ORDER  BY id"

authorize_group_check_query = "\
    SELECT id, groupname, attribute, \
           value, op \
    FROM   ${groupcheck_table} \
    WHERE  groupname = '%{${group_attribute}}' \
    ORDER  BY id"

authorize_group_reply_query = "\
    SELECT id, groupname, attribute, \
           value, op \
    FROM   ${groupreply_table} \
    WHERE  groupname = '%{${group_attribute}}' \
    ORDER  BY id"

group_membership_query = "\
    SELECT groupname \
    FROM   ${usergroup_table} \
    WHERE  username = '%{SQL-User-Name}' \
    ORDER  BY priority"

# -- post-auth ------------------------------------------------
# Audit every auth attempt (Access-Accept + Access-Reject).
# `pass` stores either the submitted password (success) or
# the reject reason (failure) — FreeRADIUS fills it via the
# %{reply:Reply-Message} expansion on reject.
post-auth_query = "\
    INSERT INTO ${postauth_table} \
           (username, pass, reply, authdate, class) \
    VALUES ( \
           '%{User-Name}', \
           '%{%{User-Password}:-%{Chap-Password}}', \
           '%{reply:Packet-Type}', \
           '%S', \
           '%{reply:Class}')"

# -- accounting -----------------------------------------------
accounting {
    reference = "%{tolower:type.%{Acct-Status-Type}.query}"

    type {
        accounting-on {
            query = "\
                UPDATE ${acct_table1} \
                SET    acctstoptime       = '%S', \
                       acctsessiontime    = UNIX_TIMESTAMP('%S') - UNIX_TIMESTAMP(acctstarttime), \
                       acctterminatecause = '%{Acct-Terminate-Cause}', \
                       class              = '%{Class}' \
                WHERE  acctstoptime IS NULL \
                AND    nasipaddress       = '%{NAS-IP-Address}' \
                AND    acctstarttime      <= '%S'"
        }

        accounting-off {
            query = "\
                UPDATE ${acct_table1} \
                SET    acctstoptime       = '%S', \
                       acctsessiontime    = UNIX_TIMESTAMP('%S') - UNIX_TIMESTAMP(acctstarttime), \
                       acctterminatecause = '%{Acct-Terminate-Cause}', \
                       class              = '%{Class}' \
                WHERE  acctstoptime IS NULL \
                AND    nasipaddress       = '%{NAS-IP-Address}' \
                AND    acctstarttime      <= '%S'"
        }

        start {
            query = "\
                INSERT INTO ${acct_table1} \
                   (acctsessionid,     acctuniqueid,     username, \
                    realm,             nasipaddress,     nasportid, \
                    nasporttype,       acctstarttime,    acctupdatetime, \
                    acctstoptime,      acctsessiontime,  acctauthentic, \
                    connectinfo_start, connectinfo_stop, acctinputoctets, \
                    acctoutputoctets,  calledstationid,  callingstationid, \
                    acctterminatecause,servicetype,      framedprotocol, \
                    framedipaddress,   class) \
                VALUES \
                   ('%{Acct-Session-Id}', '%{Acct-Unique-Session-Id}', '%{SQL-User-Name}', \
                    '%{Realm}',           '%{NAS-IP-Address}',         '%{NAS-Port}', \
                    '%{NAS-Port-Type}',   '%S',                        '%S', \
                    NULL,                 '0',                         '%{Acct-Authentic}', \
                    '%{Connect-Info}',    '',                          '0', \
                    '0',                  '%{Called-Station-Id}',      '%{Calling-Station-Id}', \
                    '',                   '%{Service-Type}',           '%{Framed-Protocol}', \
                    '%{Framed-IP-Address}','%{Class}')"

            query = "\
                UPDATE ${acct_table1} \
                SET    acctstarttime     = '%S', \
                       acctupdatetime    = '%S', \
                       connectinfo_start = '%{Connect-Info}' \
                WHERE  acctuniqueid = '%{Acct-Unique-Session-Id}' \
                AND    username = '%{SQL-User-Name}'"
        }

        interim-update {
            query = "\
                UPDATE ${acct_table1} \
                SET    acctupdatetime  = '%S', \
                       acctinterval    = %{%{integer:Event-Timestamp}:-UNIX_TIMESTAMP('%S')} - UNIX_TIMESTAMP(acctupdatetime), \
                       framedipaddress = '%{Framed-IP-Address}', \
                       acctsessiontime = %{%{Acct-Session-Time}:-NULL}, \
                       acctinputoctets = %{%{Acct-Input-Gigawords}:-0} << 32 | %{%{Acct-Input-Octets}:-0}, \
                       acctoutputoctets = %{%{Acct-Output-Gigawords}:-0} << 32 | %{%{Acct-Output-Octets}:-0} \
                WHERE  acctuniqueid = '%{Acct-Unique-Session-Id}' \
                AND    username = '%{SQL-User-Name}'"

            query = "\
                INSERT INTO ${acct_table1} \
                    (acctsessionid, acctuniqueid, username, \
                     realm, nasipaddress, nasportid, \
                     nasporttype, acctstarttime, \
                     acctupdatetime, acctstoptime, \
                     acctsessiontime, acctauthentic, \
                     connectinfo_start, connectinfo_stop, \
                     acctinputoctets, acctoutputoctets, \
                     calledstationid, callingstationid, \
                     servicetype, framedprotocol, \
                     framedipaddress, class) \
                VALUES \
                    ('%{Acct-Session-Id}', '%{Acct-Unique-Session-Id}', '%{SQL-User-Name}', \
                     '%{Realm}', '%{NAS-IP-Address}', '%{NAS-Port}', \
                     '%{NAS-Port-Type}', FROM_UNIXTIME(UNIX_TIMESTAMP('%S') - %{%{Acct-Session-Time}:-0}), \
                     '%S', NULL, \
                     %{%{Acct-Session-Time}:-NULL}, '%{Acct-Authentic}', \
                     '', NULL, \
                     %{%{Acct-Input-Gigawords}:-0} << 32 | %{%{Acct-Input-Octets}:-0}, \
                     %{%{Acct-Output-Gigawords}:-0} << 32 | %{%{Acct-Output-Octets}:-0}, \
                     '%{Called-Station-Id}', '%{Calling-Station-Id}', \
                     '%{Service-Type}', '%{Framed-Protocol}', \
                     '%{Framed-IP-Address}', '%{Class}')"
        }

        stop {
            query = "\
                UPDATE ${acct_table1} \
                SET    acctstoptime       = '%S', \
                       acctsessiontime    = %{%{Acct-Session-Time}:-NULL}, \
                       acctinputoctets    = %{%{Acct-Input-Gigawords}:-0} << 32 | %{%{Acct-Input-Octets}:-0}, \
                       acctoutputoctets   = %{%{Acct-Output-Gigawords}:-0} << 32 | %{%{Acct-Output-Octets}:-0}, \
                       acctterminatecause = '%{Acct-Terminate-Cause}', \
                       connectinfo_stop   = '%{Connect-Info}' \
                WHERE  acctuniqueid = '%{Acct-Unique-Session-Id}' \
                AND    username = '%{SQL-User-Name}'"

            query = "\
                INSERT INTO ${acct_table1} \
                    (acctsessionid, acctuniqueid, username, \
                     realm, nasipaddress, nasportid, \
                     nasporttype, acctstarttime, \
                     acctupdatetime, acctstoptime, \
                     acctsessiontime, acctauthentic, \
                     connectinfo_start, connectinfo_stop, \
                     acctinputoctets, acctoutputoctets, \
                     calledstationid, callingstationid, \
                     acctterminatecause, servicetype, framedprotocol, \
                     framedipaddress, class) \
                VALUES \
                    ('%{Acct-Session-Id}', '%{Acct-Unique-Session-Id}', '%{SQL-User-Name}', \
                     '%{Realm}', '%{NAS-IP-Address}', '%{NAS-Port}', \
                     '%{NAS-Port-Type}', FROM_UNIXTIME(UNIX_TIMESTAMP('%S') - %{%{Acct-Session-Time}:-0}), \
                     '%S', '%S', \
                     %{%{Acct-Session-Time}:-NULL}, '%{Acct-Authentic}', \
                     '', '%{Connect-Info}', \
                     %{%{Acct-Input-Gigawords}:-0} << 32 | %{%{Acct-Input-Octets}:-0}, \
                     %{%{Acct-Output-Gigawords}:-0} << 32 | %{%{Acct-Output-Octets}:-0}, \
                     '%{Called-Station-Id}', '%{Calling-Station-Id}', \
                     '%{Acct-Terminate-Cause}', '%{Service-Type}', '%{Framed-Protocol}', \
                     '%{Framed-IP-Address}', '%{Class}')"
        }
    }
}

# -- simultaneous-use -----------------------------------------
simul_count_query = "\
    SELECT COUNT(*) \
    FROM   ${acct_table1} \
    WHERE  username = '%{SQL-User-Name}' \
    AND    acctstoptime IS NULL"

simul_verify_query = "\
    SELECT radacctid, acctsessionid, username, nasipaddress, nasportid, framedipaddress, \
           callingstationid, framedprotocol \
    FROM   ${acct_table1} \
    WHERE  username = '%{SQL-User-Name}' \
    AND    acctstoptime IS NULL"

# -- clients (NAS) --------------------------------------------
client_query = "\
    SELECT id, nasname, shortname, type, secret, server \
    FROM   ${client_table} \
    ORDER  BY id"
