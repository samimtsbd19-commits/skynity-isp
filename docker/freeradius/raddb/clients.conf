# ============================================================
# Skynity ISP — RADIUS client list
# ------------------------------------------------------------
# Clients (NAS = MikroTik routers) live in the `nas` SQL
# table so they can be added from the Skynity admin UI at
# runtime — no FreeRADIUS restart required.
#
# The one static entry kept here is localhost, used by the
# Skynity backend's health-check (radtest from inside the
# docker network). The shared secret for it comes from the
# RADIUS_LOCALHOST_SECRET env variable so it can be rotated.
# ============================================================

client localhost {
    ipaddr      = 127.0.0.1
    secret      = ${env:RADIUS_LOCALHOST_SECRET}
    require_message_authenticator = no
    nas_type    = other
    shortname   = skynity-local
}

# Allow backend container (on the docker internal network) to
# send CoA/PoD proxy packets + radtest health checks. The whole
# 172.16.0.0/12 range covers the default Compose bridge pool;
# tighten it in production if you prefer a static bridge IP.
client docker-internal {
    ipaddr      = 172.16.0.0/12
    secret      = ${env:RADIUS_LOCALHOST_SECRET}
    require_message_authenticator = no
    nas_type    = other
    shortname   = skynity-docker
}
