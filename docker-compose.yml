# ============================================================
# Skynity ISP — One-file Docker Compose
# ------------------------------------------------------------
# This is the recommended compose file when deploying via
# Hostinger VPS → Docker Manager → "Deploy from GitHub".
#
# Requirements:
#   - A `.env` file next to this compose file (copy from .env.example)
#   - Domain (e.g. wifi.skynity.org) pointing to the VPS IP (A record)
#
# What this stack runs:
#   caddy     → public entrypoint, auto-HTTPS (Let's Encrypt) on :80/:443
#   frontend  → React SPA served by Nginx (internal)
#   backend   → Node.js API + Telegram bot + cron (internal)
#   mysql     → MySQL 8 database (internal)
#   redis     → Redis 7 cache (internal)
#   migrate   → Runs SQL migrations once per `up`, then exits
# ============================================================

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN: ${DOMAIN:-wifi.skynity.org}
      # Optional: your email for Let's Encrypt renewal notices
      ACME_EMAIL: ${ACME_EMAIL:-admin@skynity.org}
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-skynity}
      MYSQL_USER: ${DB_USER:-skynity}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      TZ: ${APP_TIMEZONE:-Asia/Dhaka}
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      # NOTE: --default-authentication-plugin was REMOVED in MySQL 8.4.
      # caching_sha2_password is the default anyway.
    healthcheck:
      # Force TCP so the check only passes once port 3306 is actually
      # bound. Avoids ECONNREFUSED in dependent services.
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -P 3306 --protocol=tcp -u root -p\"$$MYSQL_ROOT_PASSWORD\" --silent",
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  migrate:
    build:
      context: ./backend
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-skynity}
      DB_USER: ${DB_USER:-skynity}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # Migrations don't need the rest but config validator requires them
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-0:placeholder}
      TELEGRAM_ADMIN_IDS: ${TELEGRAM_ADMIN_IDS:-}
      JWT_SECRET: ${JWT_SECRET}
      SESSION_SECRET: ${SESSION_SECRET}
    command: ["node", "src/database/migrate.js"]
    depends_on:
      mysql:
        condition: service_healthy
    restart: "no"

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      LOG_LEVEL: ${LOG_LEVEL:-info}

      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-skynity}
      DB_USER: ${DB_USER:-skynity}
      DB_PASSWORD: ${DB_PASSWORD}

      REDIS_HOST: redis
      REDIS_PORT: 6379

      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_ADMIN_IDS: ${TELEGRAM_ADMIN_IDS:-}

      MIKROTIK_HOST: ${MIKROTIK_HOST:-}
      MIKROTIK_PORT: ${MIKROTIK_PORT:-443}
      MIKROTIK_USERNAME: ${MIKROTIK_USERNAME:-}
      MIKROTIK_PASSWORD: ${MIKROTIK_PASSWORD:-}
      MIKROTIK_USE_SSL: ${MIKROTIK_USE_SSL:-true}
      MIKROTIK_REJECT_UNAUTHORIZED: ${MIKROTIK_REJECT_UNAUTHORIZED:-false}

      SNMP_ENABLED: ${SNMP_ENABLED:-false}
      SNMP_COMMUNITY: ${SNMP_COMMUNITY:-public}
      SNMP_PORT: ${SNMP_PORT:-161}
      SNMP_VERSION: ${SNMP_VERSION:-2c}
      SNMP_TIMEOUT_MS: ${SNMP_TIMEOUT_MS:-2500}

      BKASH_NUMBER: ${BKASH_NUMBER:-}
      BKASH_TYPE: ${BKASH_TYPE:-personal}
      NAGAD_NUMBER: ${NAGAD_NUMBER:-}
      NAGAD_TYPE: ${NAGAD_TYPE:-personal}

      JWT_SECRET: ${JWT_SECRET}
      SESSION_SECRET: ${SESSION_SECRET}

      APP_NAME: ${APP_NAME:-Skynity ISP}
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Dhaka}
      CURRENCY: ${CURRENCY:-BDT}
      CURRENCY_SYMBOL: ${CURRENCY_SYMBOL:-৳}

      UPLOAD_DIR: /app/uploads
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-5}

      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://${DOMAIN:-wifi.skynity.org}}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    volumes:
      - uploads:/app/uploads
      - ./docs:/app/docs
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "80"

volumes:
  mysql_data:
  redis_data:
  uploads:
  caddy_data:
  caddy_config:
